apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: education-platform
  namespace: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/imenH-cloud/devops-education-platform-gitops.git
    targetRevision: main
    path: applications
  destination:
    server: https://kubernetes.default.svc
    namespace: education
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
